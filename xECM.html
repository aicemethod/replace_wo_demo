<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xECM</title>
    <style>
        .file-table-container {
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .file-table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .file-table-header {
            display: flex;
            justify-content: flex-start;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .file-table-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filetable-add-wrapper {
            position: relative;
        }

        .filetable-add-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            min-width: 180px;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .filetable-add-menu.is-open {
            display: block;
        }

        .filetable-add-item {
            padding: 8px 12px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filetable-add-item:hover {
            background-color: #f5f5f5;
        }

        .action-button {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            background-color: #fff;
            color: #333;
            font-size: 14px;
            font-family: SegoeUI, "Segoe UI", "Helvetica Neue", sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .action-button:hover {
            border-color: #115ea3;
        }

        .action-button-primary {
            color: #115ea3;
            border-color: #b7d1ea;
            background-color: #f6fbff;
        }

        .action-button-primary:hover {
            background-color: #edf5fc;
        }

        .action-button-neutral {
            color: #333;
        }

        .action-button-refresh {
            background-color: #f3f3f3;
            border-color: #d9d9d9;
        }

        .action-button-refresh:hover {
            background-color: #ececec;
            border-color: #cfcfcf;
        }

        .action-button-danger {
            color: #d32f2f;
            border-color: #efc3c3;
            background-color: #fff8f8;
        }

        .action-button-danger:hover {
            background-color: #ffefef;
            border-color: #e6aaaa;
        }

        .action-button-menu {
            padding-right: 10px;
        }

        .action-button-menu-caret {
            margin-left: 2px;
            transition: transform 0.2s ease;
            font-size: 12px;
        }

        .action-button-menu.is-open .action-button-menu-caret {
            transform: rotate(180deg);
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            font-family: SegoeUI, "Segoe UI", "Helvetica Neue", sans-serif;
        }

        .file-table thead {
            background-color: transparent;
        }

        .file-table th {
            padding: 12px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        .file-table td {
            padding: 12px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        .col-select {
            width: 100px;
            text-align: left;
        }

        .col-filename {
            width: 25%;
        }

        .col-type {
            width: 25%;
        }

        .col-created {
            width: 20%;
        }

        .col-sync {
            width: 20%;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 17px;
            width: 17px;
            left: 2px;
            bottom: 2px;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 50%;
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .toggle-switch input:checked+.toggle-slider {
            background-color: #f0f7ff;
            border-color: #115ea3;
        }

        .toggle-switch input:checked+.toggle-slider:before {
            transform: translateX(20px);
            border-color: #115ea3;
            background-color: #115ea3;
        }

        .toggle-switch:hover .toggle-slider {
            border-color: #115ea3;
        }

        .toggle-switch input:focus+.toggle-slider {
            box-shadow: 0 0 0 2px rgba(17, 94, 163, 0.2);
        }
    </style>
</head>

<body>
    <div class="file-table-container">
        <div>
            <div>
                <strong id="note">連携ファイルを選んでください</strong>
            </div>
        </div>
        <div class="file-table-header file-table-actions">
            <div class="filetable-add-wrapper">
                <button id="addButton" class="action-button action-button-neutral action-button-menu" type="button"
                    aria-haspopup="true" aria-expanded="false">
                    追加
                    <span class="action-button-menu-caret">▼</span>
                </button>
                <div id="addMenu" class="filetable-add-menu" role="menu">
                    <div class="filetable-add-item" role="menuitem" data-value="TSR">TSR</div>
                    <div class="filetable-add-item" role="menuitem" data-value="技術検収書(Technical Acceptance)">
                        技術検収書(Technical Acceptance)</div>
                    <div class="filetable-add-item" role="menuitem" data-value="Technical Document">Technical Document
                    </div>
                    <div class="filetable-add-item" role="menuitem" data-value="Other">Other</div>
                </div>
            </div>
            <button class="action-button action-button-primary">ファイルを保存</button>
            <button class="action-button action-button-primary">xECMに連携</button>
            <button class="action-button action-button-neutral action-button-refresh">更新</button>
            <button class="action-button action-button-danger">削除</button>
        </div>
        <div>
            <div>
                <span id="errorMessage"></span>
            </div>
        </div>
        <div>
            <div>
                <span id="infoMessage"></span>
            </div>
        </div>
        <div class="file-table-wrapper">
            <div>
                <table id="Table" class="file-table">
                    <thead>
                        <tr>
                            <th class="col-select">
                                <div>
                                    <div id="columnSelect">
                                        選択
                                    </div>
                                </div>
                            </th>

                            <th class="col-filename">
                                <div>
                                    <div id="columnFileName">
                                        ファイル名
                                    </div>
                                </div>
                            </th>

                            <th class="col-type">
                                <div>
                                    <div id="columnFileType">
                                        ファイル種類
                                    </div>
                                </div>
                            </th>

                            <th class="col-created">
                                <div>
                                    <div id="columnSubmitDate">
                                        提出医
                                    </div>
                                </div>
                            </th>

                            <th class="col-sync">
                                <div>
                                    <div id="columnDate">
                                        連携日
                                    </div>
                                </div>
                            </th>

                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="col-select">
                                <label class="toggle-switch">
                                    <input type="checkbox" aria-label="選択">
                                    <span class="toggle-slider"></span>
                                </label>
                            </td>
                            <td class="col-filename"></td>
                            <td class="col-type"></td>
                            <td class="col-created"></td>
                            <td class="col-sync"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const addButton = document.getElementById('addButton');
            const addMenu = document.getElementById('addMenu');
            const infoMessage = document.getElementById('infoMessage');

            if (!addButton || !addMenu) {
                return;
            }

            const closeMenu = function () {
                addMenu.classList.remove('is-open');
                addButton.classList.remove('is-open');
                addButton.setAttribute('aria-expanded', 'false');
            };

            const openMenu = function () {
                addMenu.classList.add('is-open');
                addButton.classList.add('is-open');
                addButton.setAttribute('aria-expanded', 'true');
            };

            addButton.addEventListener('click', function (event) {
                event.stopPropagation();
                if (addMenu.classList.contains('is-open')) {
                    closeMenu();
                } else {
                    openMenu();
                }
            });

            addMenu.addEventListener('click', function (event) {
                const item = event.target.closest('.filetable-add-item');
                if (!item) {
                    return;
                }
                closeMenu();
            });

            document.addEventListener('click', function (event) {
                if (!event.target.closest('.filetable-add-wrapper')) {
                    closeMenu();
                }
            });
        }());
    </script>
</body>

</html>
