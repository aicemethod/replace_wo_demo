<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .file-table-container {
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .file-table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .file-table-header {
            display: flex;
            justify-content: flex-start;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .file-table-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-button {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            background-color: #fff;
            color: #333;
            font-size: 14px;
            font-family: SegoeUI, "Segoe UI", "Helvetica Neue", sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .action-button:hover {
            border-color: #115ea3;
        }

        .action-button-primary {
            color: #115ea3;
            border-color: #b7d1ea;
            background-color: #f6fbff;
        }

        .action-button-primary:hover {
            background-color: #edf5fc;
        }

        .action-button-neutral {
            color: #333;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            font-family: SegoeUI, "Segoe UI", "Helvetica Neue", sans-serif;
        }

        .file-table thead {
            background-color: transparent;
        }

        .file-table th {
            padding: 12px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        .file-table td {
            padding: 12px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        .col-select {
            width: 100px;
            text-align: left;
        }

        .col-filename {
            width: 25%;
        }

        .col-type {
            width: 25%;
        }

        .col-created {
            width: 20%;
        }

        .col-sync {
            width: 20%;
        }
    </style>
</head>

<body>
    <div class="file-table-container">
        <div>
            <div>
                <strong id="note">連携ファイルを選んでください</strong>
            </div>
        </div>
        <div class="file-table-header file-table-actions">
            <button class="action-button action-button-primary">aaa</button>
            <button class="action-button action-button-neutral">bbb</button>
        </div>
        <div>
            <div>
                <span id="errorMessage"></span>
            </div>
        </div>
        <div>
            <div>
                <span id="infoMessage"></span>
            </div>
        </div>
        <div class="file-table-wrapper">
            <div>
                <table id="Table" class="file-table">
                    <thead>
                        <tr>
                            <th class="col-select">
                                <div>
                                    <div id="columnSelect">
                                        選択
                                    </div>
                                </div>
                            </th>

                            <th class="col-filename">
                                <div>
                                    <div id="columnFileName">
                                        ファイル名
                                    </div>
                                </div>
                            </th>

                            <th class="col-type">
                                <div>
                                    <div id="columnFileType">
                                        ファイル種類
                                    </div>
                                </div>
                            </th>

                            <th class="col-created">
                                <div>
                                    <div id="columnSubmitDate">
                                        提出医
                                    </div>
                                </div>
                            </th>

                            <th class="col-sync">
                                <div>
                                    <div id="columnDate">
                                        連携日
                                    </div>
                                </div>
                            </th>

                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
