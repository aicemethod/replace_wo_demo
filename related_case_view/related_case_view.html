<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関連案件テーブルUI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #333;
            font-family: SegoeUI, "Segoe UI", "Helvetica Neue", sans-serif;
        }

        .file-table-container {
            width: 100%;
        }

        .file-table-wrapper {
            overflow-x: auto;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        .file-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            border: 1px solid #e0e0e0;
        }

        .file-table td {
            padding: 10px 12px;
            font-size: 14px;
            color: #333;
            vertical-align: middle;
            white-space: nowrap;
            border: 1px solid #e0e0e0;
        }

        .file-table thead tr:first-child th {
            border-top: none;
        }

        .file-table tbody tr:last-child td {
            border-bottom: none;
        }

        .file-table tr > *:first-child {
            border-left: none;
        }

        .file-table tr > *:last-child {
            border-right: none;
        }

        .col-case-no {
            width: 14%;
        }

        .col-stage {
            width: 20%;
        }

        .col-priority {
            width: 10%;
        }

        .col-title {
            width: 26%;
            white-space: normal;
        }

        .col-customer {
            width: 18%;
        }

        .col-created-on {
            width: 12%;
        }

        .empty-row td {
            color: #666;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="file-table-container">
        <div class="file-table-wrapper">
            <table class="file-table" aria-label="関連案件一覧">
                <thead>
                    <tr>
                        <th class="col-case-no">Case No.</th>
                        <th class="col-stage">Current Process Stage</th>
                        <th class="col-priority">Priority</th>
                        <th class="col-title">Case Title</th>
                        <th class="col-customer">Customer</th>
                        <th class="col-created-on">Created On</th>
                    </tr>
                </thead>
                <tbody id="caseTableBody">
                    <tr class="empty-row">
                        <td colspan="6">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function getXrm() {
            if (window.parent && window.parent.Xrm) return window.parent.Xrm;
            if (window.Xrm) return window.Xrm;
            return null;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatDate(value) {
            if (!value) return "";
            var d = new Date(value);
            if (isNaN(d.getTime())) return value;
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, "0");
            var day = String(d.getDate()).padStart(2, "0");
            return y + "/" + m + "/" + day;
        }

        function getFormatted(row, logicalName) {
            var key = logicalName + "@OData.Community.Display.V1.FormattedValue";
            return row[key] ?? row[logicalName] ?? "";
        }

        function getCustomer(row) {
            return (
                row["_proto_customer_value@OData.Community.Display.V1.FormattedValue"] ||
                row._proto_customer_value ||
                ""
            );
        }

        function renderRows(rows) {
            var tbody = document.getElementById("caseTableBody");

            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No data</td></tr>';
                return;
            }

            tbody.innerHTML = rows.map(function (row) {
                return (
                    "<tr>" +
                    '<td class="col-case-no">' + escapeHtml(row.proto_caseno || "") + "</td>" +
                    '<td class="col-stage">' + escapeHtml(getFormatted(row, "proto_currentprocessstage")) + "</td>" +
                    '<td class="col-priority">' + escapeHtml(getFormatted(row, "proto_priority")) + "</td>" +
                    '<td class="col-title">' + escapeHtml(row.proto_name || "") + "</td>" +
                    '<td class="col-customer">' + escapeHtml(getCustomer(row)) + "</td>" +
                    '<td class="col-created-on">' + escapeHtml(formatDate(row.proto_createon)) + "</td>" +
                    "</tr>"
                );
            }).join("");
        }

        function renderError(message) {
            var tbody = document.getElementById("caseTableBody");
            tbody.innerHTML = '<tr class="empty-row"><td colspan="6">' + escapeHtml(message) + "</td></tr>";
        }

        async function loadCases() {
            var xrm = getXrm();
            if (!xrm || !xrm.WebApi) {
                renderError("Xrm.WebApi is not available.");
                return;
            }

            try {
                var query =
                    "?$select=proto_caseno,proto_currentprocessstage,proto_priority,proto_name,_proto_customer_value,proto_createon";
                var result = await xrm.WebApi.retrieveMultipleRecords("proto_incident", query);
                renderRows(result.entities || []);
            } catch (e) {
                renderError(e && e.message ? e.message : "Failed to load data.");
            }
        }

        window.onload = loadCases;
    </script>
</body>

</html>
